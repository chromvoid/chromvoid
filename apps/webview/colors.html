<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChromVoid - Passwords Vault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Satoshi';
            src: url('https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500&display=swap');
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #070b12;
            background-image: radial-gradient(circle at 50% 50%, #181c23 0%, #070b12 100%);
        }
        .grid-bg {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(29, 41, 59, 0.2) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(29, 41, 59, 0.2) 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .machined-edge {
            border-top: 1px solid rgba(0, 229, 255, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-surface-variant": "#bac9cc",
                "surface-container-high": "#262a32",
                "surface-bright": "#353941",
                "surface-variant": "#31353d",
                "primary-fixed-dim": "#00daf3",
                "on-secondary-container": "#00424b",
                "background": "#070b12",
                "outline": "#849396",
                "on-tertiary-fixed-variant": "#582a9f",
                "surface-dim": "#0f141b",
                "inverse-primary": "#006875",
                "inverse-surface": "#dfe2ed",
                "tertiary": "#f4e8ff",
                "on-primary-container": "#00626e",
                "secondary-fixed-dim": "#4ad8ee",
                "on-primary-fixed-variant": "#004f58",
                "surface": "#101722",
                "on-primary-fixed": "#001f24",
                "secondary": "#4ad8ee",
                "tertiary-fixed-dim": "#d4bbff",
                "surface-container-low": "#181c23",
                "on-secondary-fixed": "#001f24",
                "surface-container-lowest": "#0a0e15",
                "surface-container": "#1c2027",
                "surface-container-highest": "#31353d",
                "on-error-container": "#ffdad6",
                "error": "#ffb4ab",
                "on-background": "#dfe2ed",
                "outline-variant": "#3b494c",
                "on-secondary": "#00363d",
                "secondary-fixed": "#9cf0ff",
                "on-secondary-fixed-variant": "#004f58",
                "on-tertiary": "#400688",
                "error-container": "#93000a",
                "primary-container": "#00e5ff",
                "on-error": "#690005",
                "on-surface": "#dfe2ed",
                "on-tertiary-container": "#6b40b2",
                "secondary-container": "#00b6cb",
                "primary": "#c3f5ff",
                "tertiary-fixed": "#ebdcff",
                "inverse-on-surface": "#2c3139",
                "surface-tint": "#00daf3",
                "tertiary-container": "#ddc7ff",
                "on-tertiary-fixed": "#260058",
                "on-primary": "#00363d",
                "primary-fixed": "#9cf0ff"
              },
              fontFamily: {
                "headline": ["JetBrains Mono", "monospace"],
                "body": ["JetBrains Mono", "monospace"],
                "label": ["JetBrains Mono", "monospace"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="text-on-surface antialiased min-h-screen grid-bg font-label">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#0f141b] border-b border-[#1d293b]/50 h-16 flex items-center px-6 justify-between">
<div class="flex items-center space-x-4">
<div class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#00e5ff]" data-icon="menu">menu</span>
</div>
<h1 class="font-['JetBrains_Mono'] font-bold tracking-tight text-lg uppercase text-[#00e5ff]">PASSWORDS</h1>
</div>
<div class="flex items-center justify-end space-x-2">
<button class="w-8 h-8 flex items-center justify-center rounded hover:bg-white/5 text-slate-400 active:scale-90 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="add_circle">add_circle</span>
</button>
<button class="w-8 h-8 flex items-center justify-center rounded hover:bg-white/5 text-slate-400 active:scale-90 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="search">search</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-6">
<!-- SectionHeader -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-slate-500 text-sm" data-icon="account_tree">account_tree</span>
<span class="font-bold text-xl tracking-tight text-on-surface">Root</span>
</div>
<div class="bg-surface-container-lowest px-3 py-1 rounded-sm border border-outline-variant/30">
<span class="text-[10px] uppercase tracking-widest text-secondary font-semibold">12 Entries</span>
</div>
</div>
<!-- List Section -->
<div class="space-y-3">
<!-- Row 1: Folder Financial -->
<div class="group flex items-center justify-between p-4 bg-[#101722] border border-[#1d293b] rounded-xl hover:border-secondary/30 transition-all cursor-pointer h-20 machined-edge">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<div>
<h3 class="font-semibold text-on-surface">Financial</h3>
<p class="text-[10px] text-slate-500 uppercase tracking-wider">Vault Group</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-xs text-secondary-container font-bold">04</span>
<span class="material-symbols-outlined text-slate-600 text-sm" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Row 2: Selected Folder -->
<div class="group flex items-center justify-between p-4 bg-[#00e5ff]/10 border-2 border-[#00e5ff] rounded-xl shadow-[0_0_20px_rgba(0,229,255,0.15)] transition-all cursor-pointer h-20 relative overflow-hidden">
<div class="absolute top-0 right-0 p-1">
<span class="text-[8px] text-[#00e5ff]/40">HASH: 0x8F2A</span>
</div>
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-lg bg-[#00e5ff]/20 flex items-center justify-center text-[#00e5ff]">
<span class="material-symbols-outlined" data-icon="mail" style="font-variation-settings: 'FILL' 1;">mail</span>
</div>
<div>
<h3 class="font-bold text-[#00e5ff]">Email Accounts</h3>
<p class="text-[10px] text-[#00e5ff]/60 uppercase tracking-wider">Primary Comms</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-xs text-[#00e5ff] font-bold">08</span>
<span class="material-symbols-outlined text-[#00e5ff] text-sm" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Row 3: Entry Amazon -->
<div class="group flex items-center justify-between p-4 bg-[#101722] border border-[#1d293b] rounded-xl hover:bg-surface-container-high transition-all cursor-pointer h-20 machined-edge">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-lg bg-[#262a32] flex items-center justify-center border border-outline-variant/20 overflow-hidden">
<span class="font-bold text-lg text-on-surface">A</span>
</div>
<div>
<h3 class="font-semibold text-on-surface">Amazon</h3>
<p class="text-[10px] text-slate-500 uppercase tracking-tighter">Last synced: 2h ago</p>
</div>
</div>
<div class="flex items-center space-x-3">
<div class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-slate-400" data-icon="lock">lock</span>
</div>
<span class="material-symbols-outlined text-slate-600 text-sm" data-icon="more_vert">more_vert</span>
</div>
</div>
</div>
<!-- Decorative Integrity Indicator -->
<div class="pt-8 flex flex-col items-center space-y-4">
<div class="h-[1px] w-full bg-gradient-to-r from-transparent via-[#1d293b] to-transparent"></div>
<div class="flex items-center space-x-2 opacity-40">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="text-[9px] uppercase tracking-[0.3em] text-on-surface-variant font-medium">System Status: Encrypted &amp; Locked</span>
</div>
</div>
</main>
<!-- Navigation Area Container (BottomNavBar) -->
<div class="fixed bottom-0 left-0 w-full z-40">
<!-- BottomNavBar -->
<nav class="bg-[#0a0e15] border-t border-[#1d293b] shadow-[0_-4px_24px_rgba(0,0,0,0.4)] h-20 w-full flex justify-around items-center px-4 pb-safe rounded-t-xl">
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 px-6 py-2 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="folder_open">folder_open</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Files</span>
</a>
<a class="flex flex-col items-center justify-center text-[#00e5ff] bg-[#00e5ff]/10 rounded-xl px-6 py-2 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="lock_open" style="font-variation-settings: 'FILL' 1;">lock_open</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Passwords</span>
</a>
</nav>
</div>
</body></html>
