<!DOCTYPE html>
<html loading>

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual"
  />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta http-equiv="Pragma" content="no-cache" />
  <link rel="icon" href="./assets/favicon.png" type="image/png">
  <meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate" />

  <title>ChromVoid - Your Data - Your Rules!</title>
  <meta name="description" content="Most private file storage">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset: http://asset.localhost; media-src 'self' blob: asset: chromvoid-media: http://asset.localhost; font-src 'self' data:; connect-src 'self' data: ipc: http://ipc.localhost http://chromvoid.local ws://localhost:4400 ws://127.0.0.1:4400 ws://localhost:4410 ws://127.0.0.1:4410 ws://*:4410; worker-src 'self' blob:;">
  <style>
    html[loading],
    html[loading] body {
      min-height: 100%;
      margin: 0;
      background: var(--cv-color-splash-bg, black);
    }

    html[loading] body {
      overflow: hidden;
    }

    #loading-native.loading-screen {
      display: none;
    }
  </style>
  <link href="./styles/styles.css" rel="stylesheet" />
  <script defer type="module" src="./index.ts"></script>
</head>

<body>
  <div id="loading-native" class="loading-screen" aria-hidden="true">
    <div class="splash-logo" data-splash-logo-stage>
      <img
        class="splash-logo__image"
        data-splash-logo-image
        src="./assets/icon.png"
        alt=""
        decoding="sync"
        fetchpriority="high"
      />
    </div>
  </div>
  <chromvoid-app></chromvoid-app>
</body>

</html>
