# Application permission sets.

[[set]]
identifier = "desktop"
description = "Permissions required by the ChromVoid desktop UI."
permissions = [
  "dialog:allow-open",
  "allow-rpc-dispatch",
  "allow-catalog-upload-chunk",
  "allow-catalog-upload-path",
  "allow-catalog-download",
  "allow-passmanager-download",
  "allow-catalog-download-path",
  "allow-catalog-open-external",
  "allow-catalog-secret-read",
  "allow-passmanager-secret-read",
  "allow-catalog-secret-write-chunk",
  "allow-passmanager-secret-write-chunk",
  "allow-passmanager-upload-chunk",
  "allow-write-text-file",
  "allow-file-stat",
  "allow-get-current-mode",
  "allow-init-local-storage",
  "allow-storage-set-root",
  "allow-backup-local-create",
  "allow-backup-local-cancel",
  "allow-restore-local-from-folder",
  "allow-restore-local-cancel",
  "allow-erase-device",
  "allow-get-session-settings",
  "allow-set-session-settings",
  "allow-gateway-get-config",
  "allow-gateway-set-enabled",
  "allow-gateway-set-access-duration",
  "allow-gateway-list-paired",
  "allow-gateway-revoke-extension",
  "allow-gateway-start-pairing",
  "allow-gateway-cancel-pairing",
  "allow-volume-mount",
  "allow-volume-unmount",
  "allow-volume-get-status",
  "allow-volume-get-backends",
  "allow-runtime-capabilities",
  "allow-touch-activity",
  "allow-master-setup",
  "allow-get-local-device-identity",
  "allow-mobile-notify-background",
  "allow-mobile-notify-foreground",
  "allow-mobile-biometric-auth",
  "allow-android-password-save-finish",
  "allow-usb-scan-devices",
  "allow-usb-connection-state",
  "allow-usb-list-paired",
  "allow-usb-pair-device",
  "allow-usb-connect",
  "allow-usb-disconnect",
  "allow-network-connection-state",
  "allow-network-list-paired-peers",
  "allow-network-remove-paired-peer",
  "allow-network-transport-metrics",
  "allow-network-generate-room-id",
  "allow-network-list-server-profiles",
  "allow-network-get-bootstrap-profile",
  "allow-network-import-server-profile",
  "allow-network-export-server-profile",
  "allow-network-record-profile-endpoint-failure",
