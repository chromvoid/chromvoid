  "allow-network-pair-cancel",
  "allow-sync-initial",
  "allow-sync-delta-apply",
  "allow-sync-reconnect",
  "allow-sync-write",
  "allow-mode-get",
  "allow-mode-switch",
  "allow-mode-status",
  "allow-mobile-acceptor-start",
  "allow-mobile-acceptor-stop",
  "allow-mobile-acceptor-status",
  "allow-start-ios-host-mode",
  "allow-stop-ios-host-mode",
  "allow-ios-host-status",
  "allow-publish-ios-presence",
  "allow-handle-ios-wake",
  "allow-desktop-pair-ios",
  "allow-desktop-connect-ios",
  "allow-ssh-keygen",
  "allow-ssh-agent-start",
  "allow-ssh-agent-stop",
  "allow-ssh-agent-status",
  "allow-ssh-agent-sign-approval-resolve",
]

