<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChromVoid OTP Probe</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
        margin: 0;
        background: #f5f7fb;
      }

      form {
        display: grid;
        gap: 16px;
        max-width: 480px;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
        color: #1f2937;
      }

      input {
        font: inherit;
        padding: 14px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: white;
      }
    </style>
  </head>
  <body>
    <form autocomplete="on">
      <label>
        Verification code
        <input
          id="otp_field"
          name="otp"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          placeholder="123456"
        />
      </label>
    </form>
    <script>
      window.readOtpProbeState = function () {
        return {
          otp: document.getElementById('otp_field')?.value || '',
          href: location.href,
          title: document.title,
        }
      }
    </script>
  </body>
</html>
