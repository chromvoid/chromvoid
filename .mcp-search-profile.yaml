exclude_globs:
  - business/landing/**
  - business/marketing/**
  - specs/attachments/**
  - apps/chromvoid/src-tauri/permissions/autogenerated/**
  - apps/webview/src/assets/icons/**
  - apps/browser-extensions/assets/icons/**
  - packages/ui/src/icons/**
  - apps/webview/.mock-data/**

boost_globs:
  - glob: apps/chromvoid/src-tauri/**
    weight: 0.32
  - glob: apps/webview/src/**
    weight: 0.24
  - glob: crates/core/**
    weight: 0.22
  - glob: backend/crates/server/**
    weight: 0.2
  - glob: packages/**
    weight: 0.12

demote_globs:
  - glob: business/**
    weight: 0.8
  - glob: specs/**
    weight: 0.14
  - glob: '**/assets/**'
    weight: 0.06
  - glob: '**/icons/**'
    weight: 0.04
  - glob: '**/*.lock'
    weight: 0.4
  - glob: '**/target/**'
    weight: 0.6
  - glob: '**/node_modules/**'
    weight: 0.6

synonyms:
  tauri:
    - ipc
    - command
    - invoke_handler
  command:
    - handler
    - invoke
    - rpc
  auth:
    - authentication
    - authorization
    - oauth
    - jwt
    - token
    - login
    - авторизация
    - аутентификация
  config:
    - settings
    - configuration
    - env
    - yaml
    - toml
    - json
    - конфиг
    - настройки
  profile:
    - server_profiles

intent_paths:
  code:
    boost_globs:
      - glob: apps/chromvoid/src-tauri/src/**
        weight: 0.5
      - glob: apps/webview/src/**
        weight: 0.35
      - glob: crates/core/src/**
        weight: 0.3
      - glob: backend/crates/server/src/**
        weight: 0.25
    demote_globs:
      - glob: docs/**
        weight: 0.12
      - glob: specs/**
        weight: 0.2
      - glob: business/**
        weight: 0.7
      - glob: '**/*.json'
        weight: 0.04
      - glob: '**/*.d.ts'
        weight: 0.08
      - glob: '**/assets/**'
        weight: 0.05

  docs:
    boost_globs:
      - glob: docs/**
        weight: 0.45
      - glob: specs/**
        weight: 0.3
    demote_globs:
      - glob: business/**
        weight: 0.4

  config:
    boost_globs:
      - glob: '**/*.toml'
        weight: 0.35
      - glob: '**/*.yaml'
        weight: 0.3
      - glob: '**/*.yml'
        weight: 0.3
      - glob: '**/*.json'
        weight: 0.22
      - glob: '**/*config*'
        weight: 0.25
      - glob: apps/chromvoid/src-tauri/capabilities/**
        weight: 0.35
    demote_globs:
      - glob: business/**
        weight: 0.7

  auth:
    boost_globs:
      - glob: backend/crates/server/src/**/auth/**
        weight: 0.5
      - glob: backend/crates/server/src/**/middleware/**
        weight: 0.35
      - glob: apps/chromvoid/src-tauri/src/commands/**
        weight: 0.25
      - glob: crates/core/src/**/crypto/**
        weight: 0.2
    demote_globs:
      - glob: docs/**
        weight: 0.15
      - glob: specs/**
        weight: 0.2
      - glob: business/**
        weight: 0.7

  backend:
    boost_globs:
      - glob: backend/**
        weight: 0.35
      - glob: crates/core/**
        weight: 0.2
      - glob: apps/chromvoid/src-tauri/src/**
        weight: 0.2

  frontend:
    boost_globs:
      - glob: apps/webview/src/**
        weight: 0.4
      - glob: packages/**
        weight: 0.2
    demote_globs:
      - glob: backend/**
        weight: 0.15
